<!doctype html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>infermesh · 控制台</title>
<style>
/* ================= infermesh console — "instrument bench" theme =================
   Tokens: graphite-blue ground, signal-amber accent, categorical chip palette,
   datasheet numerics (mono + tabular-nums). No CDN, no webfonts, no localStorage. */
:root{
  --bg:#0C1117; --bg2:#0E141B; --panel:#121A23; --panel2:#0F161E; --inset:#0A0F14;
  --line:#1D2833; --line2:#2C3A4A; --linesoft:rgba(140,160,180,.10);
  --text:#E7EDF4; --mut:#8DA0B3; --dim:#5D7183;
  --sig:#FFB224; --sig-soft:rgba(255,178,36,.14); --sig-ink:#221500;
  --ok:#3FB950; --warn:#D29922; --err:#F85149; --info:#58A6FF;
  --c1:#FFB224; --c2:#38BDF8; --c3:#A78BFA; --c4:#F472B6; --c5:#9AA8B6;
  --r:10px; --sb:240px; --dot:rgba(141,160,179,.16);
  --mono:ui-monospace,"SFMono-Regular","Cascadia Mono",Menlo,Consolas,"Liberation Mono",monospace;
  --sans:-apple-system,"Segoe UI",system-ui,Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
  --shadow:0 1px 0 rgba(0,0,0,.25), 0 8px 24px -18px rgba(0,0,0,.6);
}
:root[data-theme="light"]{
  --bg:#F2F4F7; --bg2:#ECEFF3; --panel:#FFFFFF; --panel2:#F7F9FB; --inset:#EDF0F4;
  --line:#DFE5EC; --line2:#C6D0DB; --linesoft:rgba(40,60,80,.08);
  --text:#1B2430; --mut:#54677A; --dim:#8C9BAB;
  --sig:#B36D00; --sig-soft:rgba(179,109,0,.12); --sig-ink:#FFFFFF;
  --ok:#1A7F37; --warn:#9A6700; --err:#CF222E; --info:#0969DA;
  --c1:#C77800; --c2:#0284C7; --c3:#7C3AED; --c4:#DB2777; --c5:#64748B;
  --dot:rgba(60,80,100,.14);
  --shadow:0 1px 2px rgba(16,24,40,.06), 0 8px 24px -18px rgba(16,24,40,.25);
}
*{box-sizing:border-box} html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font:13.5px/1.55 var(--sans);-webkit-font-smoothing:antialiased}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
::selection{background:var(--sig-soft)}
a{color:var(--info);text-decoration:none}
.num,td.num,.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
/* ---------- shell ---------- */
.app{display:grid;grid-template-columns:var(--sb) 1fr;min-height:100dvh}
.sidebar{background:var(--bg2);border-right:1px solid var(--line);position:sticky;top:0;height:100dvh;display:flex;flex-direction:column;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:18px 16px 10px}
.brand .mark{width:22px;height:22px;color:var(--sig);flex:none}
.brand b{font-size:15.5px;font-weight:650;letter-spacing:.02em}
.brand .ver{margin-left:auto;font:600 10px var(--mono);color:var(--dim);border:1px solid var(--line2);border-radius:99px;padding:2px 7px}
.navgrp{padding:10px 10px 2px}
.navgrp .glabel{font:650 10px var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding:6px 8px 4px}
:root[lang-zh] .navgrp .glabel{letter-spacing:.28em}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--mut);font:500 13px var(--sans);cursor:pointer;text-align:left;transition:background .15s,color .15s}
.nav button:hover{background:var(--panel);color:var(--text)}
.nav button.active{background:var(--panel);color:var(--text);border-color:var(--line)}
.nav button.active .ico{color:var(--sig)}
.nav .ico{width:16px;height:16px;flex:none;color:var(--dim)}
.sb-foot{margin-top:auto;padding:12px 16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px;font-size:11.5px;color:var(--dim)}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:11px 22px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--bg) 78%,transparent);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20}
.topbar h1{margin:0;font-size:15px;font-weight:650;letter-spacing:.01em}
.crumb{font:600 10px var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.spacer{flex:1}
.content{padding:22px;overflow:auto}
.page{display:none;animation:fade .18s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
/* ---------- primitives ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.card.tight{padding:12px 14px}
.card h3{margin:0 0 4px;font-size:13.5px;font-weight:650}
.eyebrow{font:650 10px var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.sub{color:var(--mut);font-size:12px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.g6{grid-template-columns:repeat(6,minmax(0,1fr))}
@media(max-width:1100px){.g6{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:780px){.app{grid-template-columns:1fr}.sidebar{display:none}.g3,.g2,.g6,.g4{grid-template-columns:1fr}}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:7px;font:500 11.5px var(--sans);padding:3px 10px;border-radius:99px;border:1px solid var(--line2);color:var(--mut);white-space:nowrap}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex:none}
.pill.ok{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 45%,transparent)}.pill.ok .dot{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.pill.err{color:var(--err);border-color:color-mix(in srgb,var(--err) 45%,transparent)}.pill.err .dot{background:var(--err)}
.pill.warn{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 45%,transparent)}.pill.warn .dot{background:var(--warn)}
.tag{display:inline-flex;align-items:center;font:600 10.5px var(--mono);padding:2px 7px;border-radius:6px;border:1px solid var(--line2);color:var(--mut)}
.tag.sig{color:var(--sig);border-color:color-mix(in srgb,var(--sig) 50%,transparent);background:var(--sig-soft)}
.tag.ok{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 40%,transparent)}
.tag.err{color:var(--err);border-color:color-mix(in srgb,var(--err) 40%,transparent)}
.tag.dim{color:var(--dim)}
.btn{font:550 12.5px var(--sans);padding:6.5px 13px;border-radius:8px;border:1px solid var(--line2);background:var(--panel2);color:var(--text);cursor:pointer;transition:border-color .15s,background .15s,transform .06s}
.btn:hover:not(:disabled){border-color:var(--sig);background:var(--panel)}
.btn:active:not(:disabled){transform:translateY(1px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.primary{background:var(--sig);border-color:var(--sig);color:var(--sig-ink);font-weight:650}
.btn.primary:hover:not(:disabled){filter:brightness(1.06);background:var(--sig)}
.btn.ghost{background:transparent}
.btn.danger:hover:not(:disabled){border-color:var(--err);color:var(--err)}
.btn.sm{padding:4px 9px;font-size:11.5px;border-radius:7px}
input,select,textarea{font:13px var(--sans);background:var(--inset);border:1px solid var(--line2);color:var(--text);border-radius:8px;padding:7px 10px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--sig)}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,summary:focus-visible{outline:2px solid var(--sig);outline-offset:1px}
label.fl{display:flex;flex-direction:column;gap:5px;font:600 11px var(--sans);color:var(--mut)}
.seg{display:inline-flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden;background:var(--inset)}
.seg button{border:0;background:transparent;color:var(--mut);padding:5px 13px;font:550 12px var(--sans);cursor:pointer}
.seg button.active{background:var(--sig);color:var(--sig-ink);font-weight:650}
.seg.mini button{padding:3.5px 10px;font-size:11px}
/* filter chips */
.fchip{display:inline-flex;align-items:center;gap:7px;font:550 11.5px var(--sans);padding:4.5px 11px;border-radius:99px;border:1px solid var(--line2);background:var(--inset);color:var(--mut);cursor:pointer;transition:border-color .15s,color .15s}
.fchip .sw{width:8px;height:8px;border-radius:2px;flex:none}
.fchip.on{color:var(--text);border-color:var(--line2);background:var(--panel)}
.fchip.on.tinted{border-color:currentColor}
.fchip.off{opacity:.45}
/* readout (signature numeric) */
.ro{font:650 24px/1.05 var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.ro small{font:550 11px var(--sans);color:var(--dim);margin-left:5px;letter-spacing:.02em}
.ro.sig{color:var(--sig)}
.kpi{display:flex;flex-direction:column;gap:7px}
.kpi .delta{font:600 11px var(--mono)}
.delta.up{color:var(--ok)}.delta.down{color:var(--err)}.delta.flat{color:var(--dim)}
/* meters */
.meter{height:7px;border-radius:99px;background:var(--inset);border:1px solid var(--line);overflow:hidden;display:flex}
.meter i{display:block;height:100%;background:var(--sig)}
.meter i.b2{background:var(--info)}
.meter.thin{height:5px}
/* tables */
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{font:650 10.5px var(--sans);letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:default}
.tbl th.sortable{cursor:pointer}
.tbl th.sortable:hover{color:var(--mut)}
.tbl th .arr{font-family:var(--mono);color:var(--sig)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--linesoft);vertical-align:middle}
.tbl td.num,.tbl th.num{text-align:right}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr.hoverable:hover{background:var(--panel2);cursor:pointer}
.tbl .exp-row td{background:var(--inset);padding:14px}
.tbl .caret{color:var(--dim);font-family:var(--mono);transition:transform .15s;display:inline-block}
.tbl tr.open .caret{transform:rotate(90deg);color:var(--sig)}
/* terminal */
.term{background:#07090C;border:1px solid var(--line);border-radius:8px;padding:12px 14px;font:12px/1.65 var(--mono);color:#C6D3DF;overflow-x:auto;white-space:pre;position:relative}
:root[data-theme="light"] .term{background:#101820;color:#C6D3DF}
.term .p{color:var(--sig)} .term .g{color:var(--ok)} .term .d{color:#5D7183} .term .w{color:var(--warn)} .term .e{color:var(--err)} .term .b{color:#58A6FF}
.term .copy{position:absolute;top:8px;right:8px}
/* plot canvas — signature dot grid */
.plotwrap{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:6px 4px 2px;background-image:radial-gradient(var(--dot) 1px,transparent 1.4px);background-size:22px 22px;background-position:11px 9px}
.plotwrap svg{display:block;width:100%;height:auto}
.axis{font:500 10.5px var(--mono);fill:var(--dim)}
.axis-t{font:600 10px var(--sans);letter-spacing:.12em;text-transform:uppercase;fill:var(--dim)}
.gridln{stroke:var(--linesoft);stroke-width:1}
.tooltip{position:fixed;z-index:99;pointer-events:none;background:var(--panel);border:1px solid var(--line2);border-radius:8px;padding:9px 11px;font:11.5px/1.5 var(--mono);color:var(--text);box-shadow:0 12px 30px -12px rgba(0,0,0,.7);opacity:0;transform:translateY(3px);transition:opacity .1s,transform .1s;max-width:280px}
.tooltip.show{opacity:1;transform:none}
.tooltip .tt-h{font:650 11.5px var(--sans);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.tooltip .sw{width:8px;height:8px;border-radius:2px;display:inline-block}
.tooltip table{border-collapse:collapse}
.tooltip td{padding:1px 0}.tooltip td:first-child{color:var(--dim);padding-right:14px}
.tooltip td:last-child{text-align:right;font-variant-numeric:tabular-nums}
/* comparison cards */
.cmpcard{border:1px solid var(--line);border-left:3px solid var(--cc,var(--sig));border-radius:var(--r);background:var(--panel);padding:13px 14px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow)}
.cmpcard .hd{display:flex;align-items:center;gap:8px}
.cmpcard .hd b{font-size:12.5px}
.cmpcard .mini{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:11px;color:var(--mut)}
.cmpcard .mini b{font:600 12px var(--mono);color:var(--text);font-variant-numeric:tabular-nums}
/* device cards */
.dev{display:flex;flex-direction:column;gap:10px}
.dev .hd{display:flex;align-items:center;gap:10px}
.dev .hd .nm{font-weight:650;font-size:13.5px}
.dev.ghost{opacity:.55;border-style:dashed}
.dl{display:grid;grid-template-columns:auto 1fr;gap:3px 16px;font-size:11.5px;color:var(--mut)}
.dl b{font:600 11.5px var(--mono);color:var(--text);font-variant-numeric:tabular-nums;text-align:right}
/* logs */
.logbox{background:var(--inset);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font:11.8px/1.7 var(--mono);height:460px;overflow:auto}
.logline{white-space:pre-wrap}
.logline .lv{font-weight:650;margin-right:8px}
.logline.INFO .lv{color:var(--info)}.logline.WARN .lv{color:var(--warn)}.logline.ERROR .lv{color:var(--err)}.logline.DEBUG .lv{color:var(--dim)}
.logline .ts{color:var(--dim);margin-right:8px}
/* chat */
.chatbox{display:flex;flex-direction:column;height:520px}
.msgs{flex:1;overflow:auto;display:flex;flex-direction:column;gap:12px;padding:6px 2px}
.msg{max-width:76%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6}
.msg.user{align-self:flex-end;background:var(--sig);color:var(--sig-ink);border-bottom-right-radius:4px}
.msg.asst{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg .meta{font:500 10.5px var(--mono);color:var(--dim);margin-top:6px}
.msg.user .meta{color:rgba(0,0,0,.45)}
/* toast */
.toasts{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:100}
.toast{background:var(--panel);border:1px solid var(--line2);border-left:3px solid var(--ok);border-radius:8px;padding:10px 14px;font-size:12.5px;box-shadow:0 12px 30px -10px rgba(0,0,0,.6);animation:fade .2s ease}
.toast.warn{border-left-color:var(--warn)}
/* download rows */
.dlrow{display:flex;align-items:center;gap:14px;padding:11px 4px;border-bottom:1px solid var(--linesoft)}
.dlrow:last-child{border-bottom:0}
.dlrow .nm{font:600 12.5px var(--mono);min-width:240px}
.dlrow .meter{flex:1;min-width:120px}
details.ref{border:1px solid var(--line);border-radius:var(--r);background:var(--panel2)}
details.ref summary{cursor:pointer;padding:11px 14px;font-weight:650;font-size:12.5px;list-style:none;display:flex;align-items:center;gap:8px}
details.ref summary::before{content:"▸";font-family:var(--mono);color:var(--sig);transition:transform .15s}
details.ref[open] summary::before{transform:rotate(90deg)}
details.ref .inner{padding:0 14px 14px}
.hint{font-size:11.5px;color:var(--dim);display:flex;gap:6px;align-items:baseline}
.hint::before{content:"›";color:var(--sig);font-family:var(--mono)}
.legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.divider{height:1px;background:var(--line);margin:14px 0}
.empty{padding:36px;text-align:center;color:var(--dim);font-size:12.5px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 8l8-5 8 5v8l-8 5-8-5z"/><path d="M4 8l8 5 8-5M12 13v8" opacity=".55"/></svg>
      <b>infermesh</b><span class="ver">v0.6.0</span>
    </div>
    <div id="navRoot"></div>
    <div class="sb-foot">
      <span class="mono" id="sbHost">s60-node-01 · :8188</span>
      <span id="sbUp"></span>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div>
        <div class="crumb" id="tbCrumb"></div>
        <h1 id="tbTitle"></h1>
      </div>
      <div class="spacer"></div>
      <span class="pill ok" id="tbHealth"><span class="dot"></span><span id="tbHealthT"></span></span>
      <span class="pill mono" id="tbMem"></span>
      <div class="seg mini" role="group" aria-label="language">
        <button id="langZh" onclick="setLang('zh')">中文</button>
        <button id="langEn" onclick="setLang('en')">EN</button>
      </div>
      <button class="btn sm ghost" id="themeBtn" onclick="toggleTheme()" aria-label="theme">◐</button>
    </div>
    <div class="content"><div id="view"></div></div>
  </main>
</div>
<div class="tooltip" id="tt"></div>
<div class="toasts" id="toasts"></div>
<script>
"use strict";
/* =============================== i18n =============================== */
/* Keys are the English strings themselves; ZH maps EN -> 中文 (mirrors the
   dashboard's i18n-coverage approach: a missing key falls back to EN). */
const ZH = {
"Overview":"总览","Serving":"服务","Models":"模型","model":"模型","Chat":"对话","Logs":"日志",
"Observe":"观测","Metrics":"指标","Devices":"设备","Benchmark":"基准测试",
"Run benchmark":"运行基准","Performance Explorer":"性能探索器","Community":"社区基准",
"Manage":"管理","Downloads":"模型下载","Settings":"设置",
"healthy":"运行正常","unreachable":"无法连接","uptime":"已运行","GCU memory":"GCU 显存",
"Console":"控制台","online":"在线","offline":"离线","disabled":"已禁用",
"Loaded models":"已加载模型","Active requests":"活跃请求","Requests today":"今日请求",
"p95 TTFT":"p95 首字延迟","Rejected (503)":"拒绝 (503)","decode":"解码","prefill":"预填充",
"Model pool":"模型池","memory ceiling":"显存上限","LRU order":"LRU 顺序","pinned":"已固定",
"loaded":"已加载","not loaded":"未加载","idle":"空闲","Load":"加载","Unload":"卸载",
"Pin":"固定","Unpin":"取消固定","Delete":"删除","Actions":"操作","Status":"状态",
"Backend":"后端","Device":"设备","Quant":"量化","Memory":"显存","est.":"预估",
"TTL in":"TTL 剩余","Removes files and unregisters the model.":"删除文件并取消注册该模型。",
"Recent benchmarks":"最近基准测试","View in Explorer":"在探索器中查看","Insight":"洞察",
"Fleet":"节点","Node":"节点","Driver":"驱动","Last benchmark":"最近基准","Utilization":"利用率",
"Temperature":"温度","Processes":"进程","last seen 3 days ago":"最后在线于 3 天前",
"CPU inference is disabled on this node: torch_gcu hooks `import torch` and CPU decode hangs. Treating the box as GCU-only.":"该节点已禁用 CPU 推理：torch_gcu 劫持 `import torch`，CPU 解码会挂起。此机器按 GCU 专用处理。",
"Model":"模型","Context":"上下文","Iterations":"迭代次数","Batch":"批大小",
"Publish to community library":"发布到社区基准库","auto-publish on completion; opt out per run":"完成后自动发布；可按单次运行选择不发布",
"Start benchmark":"开始基准测试","Running…":"运行中…","Metrics reference":"指标说明",
"Run history":"运行历史","Date":"日期","Result":"结果","view":"查看","running":"运行中","done":"已完成","failed":"失败",
"System info":"系统信息","Raw output":"原始输出","Copy":"复制","Copied":"已复制",
"Export CSV":"导出 CSV","Metric":"指标","All contexts":"全部上下文",
"Decode speed":"解码速度","Prefill speed":"预填充速度","Time to first token":"首字延迟",
"Per-token latency":"每 token 延迟","End-to-end":"端到端耗时","Peak memory":"峰值显存","Total throughput":"总吞吐",
"context length (tokens)":"上下文长度 (tokens)","samples":"样本","median":"中位数","mean":"均值",
"Chips":"芯片","toggle series":"点击切换序列","No data for this filter.":"当前筛选无数据。",
"Search model…":"搜索模型…","All quants":"全部量化","All chips":"全部芯片","Min":"最低",
"Sort":"排序","Submitter":"提交者","runs":"次运行","in-house sample":"自研·样例",
"Published automatically by benchmark runs. Hostname + optional label identifies the submitter.":"由基准运行自动发布。提交者 = 主机名 + 可选标签。",
"Search the hub":"搜索模型库","Search":"搜索","Source":"源","Size":"大小","Progress":"进度",

const GEN_TOKENS=256;
function combos(){
  const runs=[];
  for(const c of CHIPS) for(const m of MODELS) for(const q of QUANTS){
    if(!c.quants.includes(q.id)) continue;
    const memGB=m.b*2.07*q.mem*1.0+0.9;                 // weights + overhead
    if(memGB>c.mem*0.92) continue;                       // doesn't fit → no runs (real!)
    for(const ctx of CTXS){
      const scale=Math.pow(7/m.b,0.9);
      const degr=1-0.048*Math.log2(ctx/512);
      const tgBase=c.tg*scale*q.spd*degr;
      const ppBase=c.pp*Math.pow(7/m.b,0.6);
      const n=6+Math.floor(rnd()*7);
      const samples=[];
      for(let i=0;i<n;i++){
        const tg=jitter(tgBase,0.05), pp=jitter(ppBase,0.06);
        const ttft=(ctx/pp+c.ov)*1000;                   // ms
        const tpot=1000/tg;
        const e2e=ttft/1000+GEN_TOKENS*tpot/1000;        // s
        samples.push({tg,pp,ttft,tpot,e2e,mem:jitter(memGB,0.015),total:(ctx+GEN_TOKENS)/e2e});
      }
      runs.push({chip:c.id,model:m.id,quant:q.id,ctx,batch:1,samples,
                 date:"2026-0"+(5+Math.floor(rnd()*2))+"-"+String(3+Math.floor(rnd()*25)).padStart(2,"0")});
    }
  }
  return runs;
}

function boxStats(vals){
  const v=[...vals].sort((a,b)=>a-b), n=v.length;
  const q=(p)=>{const i=(n-1)*p, lo=Math.floor(i), hi=Math.ceil(i);return v[lo]+(v[hi]-v[lo])*(i-lo);};
  return {min:v[0],q1:q(.25),med:q(.5),q3:q(.75),max:v[n-1],mean:v.reduce((a,b)=>a+b,0)/n,n};
}

const SVG_NS="http://www.w3.org/2000/svg";
function niceTicks(min,max,count=5){
  if(min===max){max=min+1;}
  const span=max-min, step0=span/count, mag=Math.pow(10,Math.floor(Math.log10(step0)));
  const norm=step0/mag; const step=(norm<1.5?1:norm<3?2:norm<7?5:10)*mag;
  const lo=Math.floor(min/step)*step, hi=Math.ceil(max/step)*step;
  const ticks=[]; for(let v=lo;v<=hi+step*0.5;v+=step) ticks.push(+v.toFixed(10));
  return {lo,hi,ticks};
}
function sparkPath(vals,w,h,pad=2){
  const min=Math.min(...vals), max=Math.max(...vals), span=(max-min)||1;
  return vals.map((v,i)=>(i?"L":"M")+(pad+i*(w-2*pad)/(vals.length-1)).toFixed(1)+","+(h-pad-(v-min)/span*(h-2*pad)).toFixed(1)).join(" ");
}
function sparkSVG(vals,{w=120,h=34,area=false,color="var(--sig)"}={}){
  const p=sparkPath(vals,w,h);

  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-hidden="true">`+
    (area?`<path d="${p} L${w-2},${h-2} L2,${h-2} Z" fill="${color}" opacity=".12"/>`:"")+
    `<path d="${p}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round"/></svg>`;
}

/* Grouped box plot: X = context groups, one box per active series within a
   group. Series = {key,label,color,hex,statsByCtx:{ctx:{min,q1,med,q3,max,mean,n}}} */
function boxPlotSVG(series,ctxs,metric,{w=920,h=380}={}){
  const padL=64,padR=16,padT=18,padB=44;
  const iw=w-padL-padR, ih=h-padT-padB;
  let vmin=Infinity,vmax=-Infinity;
  series.forEach(s=>ctxs.forEach(c=>{const st=s.statsByCtx[c];if(st){vmin=Math.min(vmin,st.min);vmax=Math.max(vmax,st.max);}}));
  if(!isFinite(vmin)) return `<div class="empty">${esc(t("No data for this filter."))}</div>`;
  const pad=(vmax-vmin)*0.08||1; vmin=Math.max(0,vmin-pad); vmax+=pad;
  const {lo,hi,ticks}=niceTicks(vmin,vmax,5);
  const Y=v=>padT+ih-(v-lo)/(hi-lo)*ih;
  const groupW=iw/ctxs.length;
  const bw=Math.min(26,Math.max(12,groupW/(series.length+1.6)*0.72));
  let el=`<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="box plot">`;
  ticks.forEach(v=>{el+=`<line class="gridln" x1="${padL}" x2="${w-padR}" y1="${Y(v)}" y2="${Y(v)}"/>`+
    `<text class="axis" x="${padL-8}" y="${Y(v)+3.5}" text-anchor="end">${fmt(v,METRICS[metric].d>1?1:METRICS[metric].d)}</text>`;});
  el+=`<text class="axis-t" x="${padL}" y="${padT-6}">${esc(t(METRICS[metric].label))} · ${METRICS[metric].unit}</text>`;
  ctxs.forEach((c,gi)=>{
    const gx=padL+gi*groupW+groupW/2;
    el+=`<text class="axis" x="${gx}" y="${h-padB+18}" text-anchor="middle">${c>=1024?(c/1024)+"k":c}</text>`;
    const act=series.length, span=bw*1.15;
    series.forEach((s,si)=>{
      const st=s.statsByCtx[c]; if(!st) return;
      const x=gx+(si-(act-1)/2)*span;
      const cap=bw*0.42;
      el+=`<g class="box" data-s="${s.key}" data-ctx="${c}" style="cursor:crosshair">`+
        `<line x1="${x}" x2="${x}" y1="${Y(st.min)}" y2="${Y(st.q1)}" stroke="${s.color}" stroke-width="1.3"/>`+
        `<line x1="${x}" x2="${x}" y1="${Y(st.q3)}" y2="${Y(st.max)}" stroke="${s.color}" stroke-width="1.3"/>`+
        `<line x1="${x-cap}" x2="${x+cap}" y1="${Y(st.min)}" y2="${Y(st.min)}" stroke="${s.color}" stroke-width="1.3"/>`+
        `<line x1="${x-cap}" x2="${x+cap}" y1="${Y(st.max)}" y2="${Y(st.max)}" stroke="${s.color}" stroke-width="1.3"/>`+
        `<rect x="${x-bw/2}" y="${Y(st.q3)}" width="${bw}" height="${Math.max(1.5,Y(st.q1)-Y(st.q3))}" rx="2.5" fill="${s.hex}22" stroke="${s.color}" stroke-width="1.4"/>`+
        `<line x1="${x-bw/2}" x2="${x+bw/2}" y1="${Y(st.med)}" y2="${Y(st.med)}" stroke="${s.color}" stroke-width="2.4"/>`+
        `<rect x="${x-span/2}" y="${padT}" width="${span}" height="${ih}" fill="transparent"/></g>`;
    });
  });
  el+=`<text class="axis-t" x="${w-padR}" y="${h-8}" text-anchor="end">${esc(t("context length (tokens)"))}</text></svg>`;
  return el;
}

const EX={metric:"tg",model:"Qwen2.5-7B-Instruct",chips:new Set(CHIPS.map(c=>c.id)),quants:new Set(["fp16","int8","4bit"])};
function exSeries(){
  const out=[],map={};
  for(const c of CHIPS){ if(!EX.chips.has(c.id)) continue;
    for(const q of QUANTS){ if(!EX.quants.has(q.id)) continue;
      const rs=RUNS.filter(r=>r.chip===c.id&&r.model===EX.model&&r.quant===q.id);
      if(!rs.length) continue;
      const statsByCtx={};
      rs.forEach(r=>statsByCtx[r.ctx]=boxStats(r.samples.map(METRICS[EX.metric].get)));
      const s={key:c.id+"·"+q.id,label:c.name+" · "+q.id,chip:c.id,quant:q.id,color:c.color,hex:c.hex,statsByCtx,
               dash:q.id==="fp16"?null:q.id};
      out.push(s); map[s.key]=s;
    }}
  return {out,map};
}
function exCSV(series){
  const md=METRICS[EX.metric];
  let rows=[["chip","quant","model","context","metric","unit","median","q1","q3","mean","min","max","n"].join(",")];
  series.forEach(s=>CTXS.forEach(c=>{const st=s.statsByCtx[c];if(!st)return;
    rows.push([chipById(s.chip).name,s.quant,EX.model,c,EX.metric,md.unit,st.med.toFixed(3),st.q1.toFixed(3),st.q3.toFixed(3),st.mean.toFixed(3),st.min.toFixed(3),st.max.toFixed(3),st.n].join(","));}));
  return rows.join("\n");
}

function mbu(id,q){const c=chipOf(id);return 7*BPP[q]*c.tg*qspd(q)/SPECS[id].bw;}
function mfu(id){const c=chipOf(id);return 2*7*c.pp/1000/SPECS[id].tf;}
function tokJ(id){const c=chipOf(id),q=MEMBRK[id].q;return c.tg*qspd(q)/PWR[id];}
/* --- per-request latency distributions (seeded) --- */
function genDist(id){
 const c=chipOf(id),q=MEMBRK[id].q,spd=qspd(q);
 const itlB=1000/(c.tg*spd), ttB=(2048/c.pp+c.ov)*1000;
 const spike={s60:.04,a100:.008,"4090":.01,m3max:.02,gx1:.025}[id];
 const itl=[],ttft=[];
 for(let i=0;i<3000;i++){let v=itlB*(0.93+0.14*rnd());if(rnd()<spike)v*=2+6*rnd();itl.push(v);}
 for(let i=0;i<300;i++){let v=ttB*(0.94+0.12*rnd());if(rnd()<spike*0.8)v*=1.4+1.6*rnd();ttft.push(v);}
 const e2e=ttft.map(t=>(t+256*itl[Math.floor(rnd()*itl.length)])/1000);
 return {q,itl,ttft,e2e};
}
const DIST={}; CHIPS.forEach(c=>DIST[c.id]=genDist(c.id));
function pct(a,p){const s=[...a].sort((x,y)=>x-y),i=(s.length-1)*p,lo=Math.floor(i),hi=Math.ceil(i);return s[lo]+(s[hi]-s[lo])*(i-lo);}
function cvOf(a){const m=a.reduce((s,x)=>s+x,0)/a.length,v=a.reduce((s,x)=>s+(x-m)*(x-m),0)/a.length;return Math.sqrt(v)/m;}
/* --- concurrency sweep → throughput/p99 frontier --- */
const SWEEP=[1,2,4,8,16,32,64];
const SAT={s60:6,a100:28,"4090":22,m3max:8,gx1:12};
function frontier(id){
 const c=chipOf(id),q=MEMBRK[id].q,t1=c.tg*qspd(q),tt0=2048/c.pp+c.ov,s=SAT[id];
 return SWEEP.map(k=>({k,thr:t1*k/(1+Math.pow(k/s,1.35)),
                       p99:tt0*(1+0.18*k/s+0.9*Math.pow(k/s,2.2))*1.25}));
}
function goodput(id,slo){let g=0,kk=0;for(const p of frontier(id))if(p.p99<=slo&&p.thr>g){g=p.thr;kk=p.k;}return {g,k:kk};}

 pts+=`<text x="${X(ixp)}" y="${Y(perfp)-13}" text-anchor="middle" class="axis" fill="${c.hex}">prefill</text>`;
 return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">

function frontierSVG(ids,slo){

 g+=`<line x1="${L}" x2="${W-R}" y1="${Y(slo)}" y2="${Y(slo)}" stroke="var(--warn)" stroke-width="1.6" stroke-dasharray="7 5"/><text x="${W-R}" y="${Y(slo)-6}" text-anchor="end" class="axis" fill="var(--warn)">SLO p99 ≤ ${slo}s</text>`;

   <p style="margin:6px 0 2px;font-size:12.5px;line-height:1.7">${esc(t("GX-1 efficiency collapses 81% → 64% from 4 to 8 cards while A100/NVLink holds 82%. Points at GXLink all-reduce bandwidth — the single highest-leverage hardware question this system can answer."))}</p>
  </div>
 </div>
 <div class="hint">${esc(t("S60 runs single-card in the current deployment; add nodes to populate its row."))}</div>`;
}
function anDistT(){
 const id=AN.dist,c=chipOf(id),D=DIST[id];
 const row=(lb,a,unit,d)=>`<tr><td>${esc(t(lb))}</td>
  <td class="num">${pct(a,.5).toFixed(d)}</td><td class="num">${pct(a,.9).toFixed(d)}</td>
  <td class="num">${pct(a,.99).toFixed(d)}</td><td class="num">${pct(a,.999).toFixed(d)}</td>
  <td class="num">${(cvOf(a)*100).toFixed(1)}%</td><td class="mono sub">${unit}</td></tr>`;
 const spikes=D.itl.filter(v=>v>2*pct(D.itl,.5)).length;
 return `
 <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">${chipPick("dist",false,"anDistC")}</div>
 <div class="grid g2" style="margin-bottom:14px">
  <div class="card">
   <div class="eyebrow">${esc(t("Latency distributions"))} · ${esc(c.name)} · ${D.q} · 7B @2k</div>
   <table class="tbl"><thead><tr><th>${esc(t("metric"))}</th><th class="num">p50</th><th class="num">p90</th><th class="num">p99</th><th class="num">p99.9</th><th class="num">CV</th><th></th></tr></thead><tbody>
    ${row("TTFT",D.ttft,"ms",0)}
    ${row("ITL",D.itl,"ms",1)}
    ${row("E2E",D.e2e,"s",2)}
   </tbody></table>
  </div>
  <div class="card">
   <div class="eyebrow">${esc(t("ITL histogram"))} · n=3000</div>
   <div class="plotwrap" style="padding:10px 12px">${histSVG(D.itl,c.hex)}</div>
   <div class="grid g2" style="margin-top:10px">
    <div class="card tight kpi"><div class="eyebrow">${esc(t("tail ratio p99/p50"))}</div><div class="ro">${(pct(D.itl,.99)/pct(D.itl,.5)).toFixed(2)}<small>×</small></div></div>
    <div class="card tight kpi"><div class="eyebrow">${esc(t("spikes >2× median"))}</div><div class="ro">${(spikes/30).toFixed(1)}<small>%</small></div></div>
   </div>
  </div>
 </div>
 <div class="hint">${esc(t("Medians lie. Tail ratio and CV are the first fingerprints of scheduler stalls, allocator pauses and kernel-launch gaps."))}</div>`;
}
P.analysis=()=>{
 const tabs=[["eff","Efficiency"],["cap","Capacity"],["scale","Scaling"],["dist","Distributions"]];
 return `
 <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
  <div class="seg">${tabs.map(([k,lb])=>`<button class="${AN.tab===k?"active":""}" onclick="anTab('${k}')">${esc(t(lb))}</button>`).join("")}</div>
 </div>
 ${AN.tab==="eff"?anEff():AN.tab==="cap"?anCapT():AN.tab==="scale"?anScaleT():anDistT()}`;
};
function mountAnalysis(){bindTTs($("#view"));}
/* ------- compare A/B (v2) ------- */
const CP={a:{chip:"s60",di:2},b:{chip:"s60",di:3}};
function cpR(){$("#view").innerHTML=P.compare();bindTTs($("#view"));}
function cpSet(side,field,val){
 if(field==="chip"){CP[side].chip=val;CP[side].di=DRVTL[val].length-1;}
 else CP[side].di=+val;
 cpR();
}
function snap(side){
 const s=CP[side],c=chipOf(s.chip),[dv,dtg]=DRVTL[s.chip][s.di],mult=dtg/c.tg;
 const q=MEMBRK[s.chip].q,spd=qspd(q),D=DIST[s.chip],b=MEMBRK[s.chip];
 const pm=Math.pow(mult,0.7),cr=CORR.find(r=>r[0]===s.chip&&r[1]===q);
 return {c,dv,q,vals:{
  tg:dtg*spd, pp:c.pp*pm,
  t50:pct(D.ttft,.5)/pm, t99:pct(D.ttft,.99)/pm, i99:pct(D.itl,.99)/mult,
  mem:b.w+b.kv+b.act+b.frag, pw:PWR[s.chip], tj:dtg*spd/PWR[s.chip],
  gm:cr?cr[2]*100:100}};
}
const CPROWS=[
 ["tg","tg (decode)","tok/s",1,true],["pp","pp (prefill)","tok/s",0,true],
 ["t50","TTFT p50","ms",0,false],["t99","TTFT p99","ms",0,false],["i99","ITL p99","ms",1,false],
 ["mem","peak mem","GB",1,false],["pw","power","W",0,false],["tj","tok/J","",3,true],["gm","greedy match","%",1,true]];
function cpSel(side){
 const s=CP[side];
 return `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
  <select class="mono" onchange="cpSet('${side}','chip',this.value)">${CHIPS.map(c=>`<option value="${c.id}" ${c.id===s.chip?"selected":""}>${esc(c.name)}</option>`).join("")}</select>
  <select class="mono" onchange="cpSet('${side}','di',this.value)">${DRVTL[s.chip].map((d,i)=>`<option value="${i}" ${i===s.di?"selected":""}>${esc(d[0])}</option>`).join("")}</select></div>`;
}
P.compare=()=>{
 const A=snap("a"),B=snap("b");
 let reg=0,imp=0;
 const rows=CPROWS.map(([k,lb,un,d,hi])=>{
  const a=A.vals[k],b=B.vals[k],dl=(b-a)/a*100;
  const bad=(hi?dl<0:dl>0)&&Math.abs(dl)>2, good=(hi?dl>0:dl<0)&&Math.abs(dl)>2;
  if(bad)reg++; if(good)imp++;
  const col=bad?"var(--err)":good?"var(--ok)":"var(--mut)";
  return `<tr><td>${esc(t(lb))}</td><td class="mono sub">${un}</td>
   <td class="num">${a.toFixed(d)}</td><td class="num">${b.toFixed(d)}</td>
   <td class="num" style="color:${col};font-weight:650">${dl>=0?"+":""}${dl.toFixed(1)}%</td></tr>`;}).join("");
 const verdict=reg?`<span class="tag" style="color:var(--err)">${reg} ${esc(t("regressions"))}</span>`:"";
 const verd2=imp?`<span class="tag" style="color:var(--ok)">${imp} ${esc(t("improvements"))}</span>`:"";
 const verd3=(!reg&&!imp)?`<span class="tag" style="color:var(--mut)">${esc(t("within noise"))}</span>`:"";
 return `
 <div class="grid g2" style="margin-bottom:14px">
  <div class="card tight"><div class="eyebrow">${esc(t("Run A"))}</div>${cpSel("a")}</div>
  <div class="card tight"><div class="eyebrow">${esc(t("Run B"))}</div>${cpSel("b")}</div>
 </div>
 <div class="card" style="margin-bottom:14px">
  <div class="eyebrow">${esc(t("metric"))} · A → B ${verdict}${verd2}${verd3}</div>
  <table class="tbl"><thead><tr><th>${esc(t("metric"))}</th><th></th>
   <th class="num">A · ${esc(A.c.name)} · ${esc(A.dv)}</th><th class="num">B · ${esc(B.c.name)} · ${esc(B.dv)}</th><th class="num">Δ%</th></tr></thead>
   <tbody>${rows}</tbody></table>
  <div class="hint">${esc(t("|Δ| > 2% is colored; smaller moves are treated as run-to-run noise. Thresholds become per-metric configs in the real build."))}</div>
 </div>
 <div class="card" style="margin-bottom:14px">
  <div class="eyebrow">${esc(t("Driver / SDK timeline"))} · ${esc(A.c.name)}</div>
  <div class="plotwrap">${timelineSVG(CP.a.chip)}</div>
  <div class="hint">${esc(t("Red = regression vs previous version. This is why driver fingerprints belong in the benchmark schema."))}</div>
 </div>
 <div class="card">
  <div class="eyebrow">${esc(t("Numerical correctness vs fp16 reference"))}</div>
  <table class="tbl"><thead><tr><th>${esc(t("chip"))}</th><th>${esc(t("quant"))}</th><th class="num">${esc(t("greedy match"))}</th><th class="num">${esc(t("mean logit KL"))}</th><th>${esc(t("status"))}</th></tr></thead><tbody>
  ${CORR.map(([id,q,gm,kl,st])=>{const c=chipOf(id);
   return `<tr><td><span class="tag" style="color:${c.hex}">${esc(c.name)}</span></td><td class="mono">${q}</td>
   <td class="num">${(gm*100).toFixed(1)}%</td><td class="num">${kl.toFixed(4)}</td>
   <td><span class="tag" style="color:${st==="pass"?"var(--ok)":"var(--warn)"}">${esc(t(st==="pass"?"PASS":"WARN"))}</span></td></tr>`;}).join("")}
  </tbody></table>
  <div class="hint">${esc(t("200 fixed prompts, greedy decode, first-divergence tracked. The first gate of any bring-up."))}</div>
 </div>`;
};
function mountCompare(){bindTTs($("#view"));}
