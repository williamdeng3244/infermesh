name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (no GPU, no vendor SDK)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv (Python ${{ matrix.python-version }})
        run: uv venv --python ${{ matrix.python-version }}

      # Install ONLY the control plane + test deps — no torch / vllm / mcp /
      # huggingface_hub. The suite must pass with zero vendor SDKs (this is the
      # project's one architectural rule, also enforced by test_no_vendor_imports);
      # the few optional-dep tests skip gracefully.
      - name: Install control plane + dev
        run: uv pip install -e ".[dev]"

      - name: Run test suite
        run: uv run pytest -q
